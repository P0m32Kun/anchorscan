{{define "content"}}
<section class="page-header">
  <div>
    <p class="eyebrow">验证工作台</p>
    <h2>{{.Project.Name}}</h2>
  </div>
  <div class="header-actions">
    <a class="button button-secondary" href="/projects/{{.Project.ID}}">返回项目</a>
  </div>
</section>

<nav class="project-tabs" aria-label="项目视图">
  <a class="project-tab" href="/projects/{{.Project.ID}}">概览</a>
  <a class="project-tab" href="/projects/{{.Project.ID}}#runs">扫描任务</a>
  <a class="project-tab active" href="/projects/{{.Project.ID}}/workbench" aria-current="page">验证工作台</a>
</nav>

<div data-workbench data-workbench-props="{{.PropsJSON}}"></div>

<noscript>
  <section class="panel">
    <p class="no-data">验证工作台需要 JavaScript 才能交互。请启用 JavaScript 后刷新页面。</p>
  </section>
</noscript>
{{end}}
