{{define "content"}}
<section class="page-header">
  <div>
    <p class="eyebrow">项目扫描</p>
    <h2>{{.Project.Name}} · 发起扫描</h2>
    <p class="meta-line project-scan-intro">本次扫描将归属本项目，并绑定到所选 Zone。</p>
  </div>
  <a class="button button-secondary" href="/projects/{{.Project.ID}}">返回项目</a>
</section>

<section class="panel" data-scan-create data-default-zone-id="{{.DefaultZoneID}}" data-scan-create-props="{{.ScanCreateProps}}">
  <noscript>
    {{if .Preflight.Errors}}
    <p class="alert alert-error"><strong>预检失败</strong><br>{{range .Preflight.Errors}}{{.Field}}: {{.Message}}<br>{{end}}</p>
    {{end}}
    <form class="form-grid" method="post" action="/scan">
      <input type="hidden" name="project_id" value="{{.Project.ID}}">
      <label>
        <span>网络分区 (Zone) <span class="required">*</span></span>
        <select name="zone_id" required>
          <option value="">请选择 Zone</option>
          {{range .Zones}}<option value="{{.ZoneID}}" {{if or (eq $.Form.ZoneID .ZoneID) (and (eq $.Form.ZoneID "") (eq $.DefaultZoneID .ZoneID))}}selected{{end}}>{{.Name}} ({{.ZoneID}})</option>{{end}}
        </select>
      </label>
      <label><span>扫描档位 <span class="required">*</span></span><select name="profile" required><option value="slow" {{if eq .Form.Profile "slow"}}selected{{end}}>slow</option><option value="normal" {{if eq .Form.Profile "normal"}}selected{{end}}>normal</option><option value="fast" {{if eq .Form.Profile "fast"}}selected{{end}}>fast</option></select></label>
      <label class="full-width"><span>目标资产 <span class="required">*</span></span><textarea name="target" rows="4" required>{{.Form.Target}}</textarea></label>
      <label class="full-width"><span>端口范围 <span class="required">*</span></span><textarea name="ports" rows="3" required>{{.Form.Ports}}</textarea></label>
      <label><span>测试设备接入点 <span class="required">*</span></span><input name="access_point" value="{{.Form.AccessPoint}}" required></label>
      <label><span>测试设备 IP <span class="required">*</span></span><input name="tester_ip" value="{{.Form.TesterIP}}" required></label>
      <div class="form-actions full-width"><button class="button button-primary" type="submit">立即启动引擎扫描</button></div>
    </form>
  </noscript>
</section>

{{end}}
