{{define "content"}}
<section class="page-header">
  <div>
    <p class="eyebrow">漏洞知识库</p>
    <h2>本地手册</h2>
    <p class="meta-line knowledgebase-intro">检索漏洞、别名、CVE 与验证、修复建议。</p>
  </div>
</section>

<section class="panel knowledgebase-search-panel">
  <div class="knowledgebase-status-row">
    <div>
      <p class="eyebrow">索引状态</p>
      <h3>本地知识库</h3>
    </div>
    <span class="status-badge knowledgebase-status">{{.Status}}</span>
  </div>
  {{range .Diagnostics}}<p class="alert alert-error">{{.Reason}}</p>{{end}}
  <form class="knowledgebase-search-form" method="get" action="/kb">
    <input name="q" value="{{.Query}}" placeholder="搜索漏洞、别名、CVE 或 ID">
    <button class="button button-primary" type="submit">搜索</button>
  </form>
</section>

<section class="knowledgebase-results">
  {{range .Entries}}
  <a class="knowledgebase-entry" href="/kb/{{.ID}}">
    <span class="knowledgebase-entry-name">{{.Name}}</span>
    <span class="knowledgebase-entry-severity severity-{{.Severity}}">{{.Severity.Label}}</span>
  </a>
  {{else}}
  <div class="panel knowledgebase-empty">
    <strong>没有匹配的条目</strong>
    <span>调整关键词后重试，支持漏洞名称、CVE、别名和 ID。</span>
  </div>
  {{end}}
</section>
{{end}}
