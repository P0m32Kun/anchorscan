{{define "content"}}
<section class="page-header">
  <div>
    <p class="eyebrow">单工具调用</p>
    <h2>单独运行工具</h2>
    <p class="meta-line">每个工具有独立页面、中文 Help 和常用参数组合。结果仍进入任务控制台查看。</p>
  </div>
  <a class="button button-secondary" href="/runs?kind=tool">工具运行历史</a>
</section>

<section class="tool-card-grid">
  {{range .Tools}}
  <a class="tool-card" href="/tools/{{.Name}}">
    <span class="tool-card-kicker">{{.Name}}</span>
    <strong>{{.Title}}</strong>
    <span>{{.Summary}}</span>
    <em>打开参数页 →</em>
  </a>
  {{end}}
</section>

<section class="panel tool-project-note">
  <p class="eyebrow">可选绑定到项目</p>
  <p class="muted">启动任务时可以选择“不绑定项目”，也可以绑定到已有项目，报告会跟随项目保存。</p>
  {{if .Projects}}
  <div class="project-chip-row">
    {{range .Projects}}<span class="status-badge port-badge">{{.Name}}</span>{{end}}
  </div>
  {{end}}
</section>
{{end}}
