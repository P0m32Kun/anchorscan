{{define "content"}}
<section class="page-header">
  <div>
    <p class="eyebrow">项目库</p>
    <h2>{{.Title}}</h2>
  </div>
  <a class="button button-secondary" href="/projects">返回列表</a>
</section>

<section class="panel">
  <form class="form-grid" method="post" action="{{.Action}}" enctype="multipart/form-data">
    <label class="full-width">
      <span>项目名称 *</span>
      <input name="name" value="{{.Project.Name}}" placeholder="起一个容易识别的项目名，例如: 某某系统资产测试" required>
    </label>
    
    <label class="full-width">
      <span>说明</span>
      <input name="description" value="{{.Project.Description}}" placeholder="简短描述项目背景">
    </label>
    
    <label>
      <span>默认扫描目标</span>
      <textarea name="default_targets" rows="6" placeholder="支持英文逗号或换行分隔多个目标，例如：
192.168.1.1
192.168.2.0/24
10.0.0.1-10.0.0.50
192.168.3.10,192.168.3.11">{{.Project.DefaultTargets}}</textarea>
    </label>
    
    <label style="display: flex; flex-direction: column; justify-content: space-between;">
      <div>
        <span>导入目标文件</span>
        <div style="font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; margin-top: 0.25rem;">支持上传 txt, list, csv 格式的文件，系统将解析并追加到目标列表中。</div>
        <input type="file" name="targets_file" accept=".txt,.list,.csv">
      </div>
      
      <div style="margin-top: 1rem;">
        <span>默认扫描档位</span>
        <select name="default_profile" style="margin-top: 0.5rem;">
          <option value="slow" {{if eq .Project.DefaultProfile "slow"}}selected{{end}}>slow (适合脆弱网络/老旧设备)</option>
          <option value="normal" {{if eq .Project.DefaultProfile "normal"}}selected{{end}}>normal (默认中速)</option>
          <option value="fast" {{if eq .Project.DefaultProfile "fast"}}selected{{end}}>fast (适合健康高速网络)</option>
        </select>
      </div>
    </label>

    <label class="full-width">
      <span>默认扫描端口</span>
      <textarea name="default_ports" rows="3" placeholder="支持 top1000、100-1000 或 80,443,8080">{{.Project.DefaultPorts}}</textarea>
      <p class="meta-line" style="margin-top: 0.35rem;">端口格式保持 rustscan 习惯：top1000 = --top；100-1000 = --range；80,443,8080 = --ports。不支持 full/highrisk，需全端口请填 1-65535。</p>
      <button class="link-button" type="button" data-insert-ports="{{.HighriskPorts}}" data-insert-target="default_ports">
        ＋ 插入高危端口列表
      </button>
    </label>
    
    <label>
      <span>排除目标</span>
      <textarea name="exclude_targets" rows="4" placeholder="扫描时需要排除的目标IP/网段，支持英文逗号或换行分隔">{{.Project.ExcludeTargets}}</textarea>
    </label>
    
    <label>
      <span>排除端口</span>
      <input name="exclude_ports" value="{{.Project.ExcludePorts}}" placeholder="例如: 22,3306（仅数字端口 CSV）" style="margin-top: 0.5rem;">
    </label>
    
    <div class="form-actions full-width" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); justify-content: space-between;">
      <button class="button button-primary" type="submit">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 1.2rem; height: 1.2rem;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
        <span>保存项目设置</span>
      </button>
      
      {{if .Project.ID}}
      <button class="button button-danger" type="button" onclick="confirmDelete()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 1.2rem; height: 1.2rem;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
        </svg>
        <span>删除该项目</span>
      </button>
      {{end}}
    </div>
  </form>
</section>

{{if .Project.ID}}
<form id="delete-form" method="post" action="/projects/{{.Project.ID}}" style="display: none;">
  <input type="hidden" name="_method" value="delete">
</form>

<script>
function confirmDelete() {
  if (confirm("确定要永久删除该项目吗？此操作不可撤销。")) {
    document.getElementById("delete-form").submit();
  }
}
</script>
{{end}}

<script src="/static/app.js"></script>
{{end}}
