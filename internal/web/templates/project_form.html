{{define "content"}}
<section class="page-header">
  <div>
    <p class="eyebrow">项目库</p>
    <h2>{{.Title}}</h2>
    <p class="meta-line project-form-intro">一个项目对应一次渗透测试任务，按网络分区（Zone）组织多次扫描并最终生成一份交付报告。</p>
  </div>
  <a class="button button-secondary" href="/projects">返回列表</a>
</section>

<section class="panel">
  <form class="form-grid project-form-grid" method="post" action="{{.Action}}">
    <label class="full-width">
      <span>任务名称 *</span>
      <input name="name" value="{{.Project.Name}}" placeholder="例如：甘肃电力内网安全检查任务" required>
    </label>

    <label class="full-width">
      <span>任务说明</span>
      <textarea name="description" rows="3" placeholder="简短描述任务背景与范围">{{.Project.Description}}</textarea>
    </label>

    <label class="full-width">
      <span>被测单位 *</span>
      <input name="client_unit" value="{{.Project.ClientUnit}}" placeholder="例如：甘肃电力" required>
    </label>

    <label class="full-width">
      <span>测试对象</span>
      <input name="test_object" value="{{.Project.TestObject}}" placeholder="例如：信息内网 / 生产控制大区">
    </label>

    <label>
      <span>测试开始日期</span>
      <input type="date" name="start_date" value="{{.Project.StartDate}}">
    </label>

    <label>
      <span>测试结束日期</span>
      <input type="date" name="end_date" value="{{.Project.EndDate}}">
    </label>

    <label class="full-width">
      <span>测试人员</span>
      <input name="testers" value="{{.Project.Testers}}" placeholder="例如：张三, 李四">
    </label>

    <div class="form-actions full-width project-form-actions">
      <button class="button button-primary" type="submit">
        <svg class="button-icon project-form-primary-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
        <span>保存项目</span>
      </button>

      {{if .Project.ID}}
      <button class="button button-danger" type="button" onclick="confirmDelete()">
        <svg class="button-icon project-form-primary-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
        </svg>
        <span>删除该项目</span>
      </button>
      {{end}}
    </div>
  </form>
</section>

{{if .Project.ID}}
<form id="delete-form" class="project-delete-form" method="post" action="/projects/{{.Project.ID}}">
  <input type="hidden" name="_method" value="delete">
</form>

<script>
function confirmDelete() {
  if (confirm("确定要永久删除该项目吗？此操作不可撤销。")) {
    document.getElementById("delete-form").submit();
  }
}
</script>
{{end}}

{{end}}
