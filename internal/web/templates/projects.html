{{define "content"}}
<section class="page-header">
  <div>
    <p class="eyebrow">项目库</p>
    <h2>项目管理</h2>
  </div>
  <a class="button button-primary" href="/projects/new">
    <svg class="button-icon projects-primary-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
    <span>新建项目</span>
  </a>
</section>

<section class="panel projects-table-panel">
  <table class="data-table projects-table">
    <thead>
      <tr>
        <th class="project-col-name">任务名称</th>
        <th class="project-col-client">被测单位</th>
        <th class="project-col-actions">操作</th>
      </tr>
    </thead>
    <tbody>
      {{range .Projects}}
      <tr>
        <td>
          <a href="/projects/{{.ID}}" class="project-name-link">{{.Name}}</a>
          <div class="project-id">ID: {{.ID}}</div>
        </td>
        <td class="project-client-unit" title="{{.ClientUnit}}">
          {{if .ClientUnit}}{{.ClientUnit}}{{else}}<span class="muted">未设置</span>{{end}}
        </td>
        <td class="project-actions">
          <a class="button button-secondary project-edit-action" href="/projects/{{.ID}}/edit">
            <svg class="button-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
            </svg>
            <span>编辑</span>
          </a>
        </td>
      </tr>
      {{else}}
      <tr>
        <td colspan="3" class="muted projects-empty-state">
          <strong>暂无项目</strong>
          <span>点击上方按钮新建一个项目。</span>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</section>
{{end}}
