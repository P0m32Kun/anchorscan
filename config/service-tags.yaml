# 服务双引擎规则表（Nuclei tags）
#
# 字段说明（对应 internal/vuln/nuclei_tags.go TagRule）：
#   name         规则唯一标识（测试断言用）
#   service      匹配指纹归一化后的服务名（normalize.go 输出）
#   product      匹配 nmap/httpx 识别的产品名
#   tech         匹配 httpx 技术栈（仅 Web 服务）
#   nuclei_tags  传给 nuclei -tags 的标签
#   target       url（Web，用 httpx URL）或 hostport（非 Web，用 IP:端口）
#
# 匹配逻辑（nuclei_tags.go:32）：service / product / tech 任一命中即生效。
# 非服务可靠覆盖的引擎会在 nse.yaml 中缺位，自动跳过，无需在此声明。
# 每条规则的 nuclei_tags 末尾统一追加 default-login（本机 338 个默认凭据模板），
# 用于覆盖弱口令/默认凭据检测。

# ===== 远程登录 =====
- name: ssh
  service: ["ssh"]
  nuclei_tags: ["ssh", "default-login"]
  target: "hostport"
- name: ftp
  service: ["ftp"]
  nuclei_tags: ["ftp", "default-login"]
  target: "hostport"
- name: telnet
  service: ["telnet"]
  nuclei_tags: ["telnet", "default-login"]
  target: "hostport"

# ===== 邮件 / 目录 =====
- name: smtp
  service: ["smtp"]
  product: ["smtp"]
  nuclei_tags: ["smtp", "default-login"]
  target: "hostport"
- name: ldap
  service: ["ldap"]
  nuclei_tags: ["ldap", "default-login"]
  target: "hostport"

# ===== 基础设施 =====
# nmap 报 DNS 服务的 service 名为 "domain"
- name: dns
  service: ["dns", "domain"]
  nuclei_tags: ["dns"]
  target: "hostport"
- name: snmp
  service: ["snmp"]
  nuclei_tags: ["snmp"]
  target: "hostport"

# ===== 远程桌面 =====
- name: rdp
  # ms-wbt-server -> rdp (normalize.go 别名)
  service: ["rdp"]
  nuclei_tags: ["rdp", "default-login"]
  target: "hostport"
- name: vnc
  service: ["vnc"]
  nuclei_tags: ["vnc", "default-login"]
  target: "hostport"
- name: winrm
  # nmap 无 NSE 脚本，仅走 nuclei
  service: ["winrm", "wsman"]
  nuclei_tags: ["winrm", "default-login"]
  target: "hostport"

# ===== 数据库 =====
- name: redis
  service: ["redis"]
  nuclei_tags: ["redis", "default-login"]
  target: "hostport"
- name: mysql
  # mariadb -> mysql (normalize.go 别名)
  service: ["mysql"]
  nuclei_tags: ["mysql", "default-login"]
  target: "hostport"
- name: postgres
  # nmap service 名为 postgresql；nuclei 同时有 postgres 和 postgresql 两个 tag
  service: ["postgres", "postgresql"]
  product: ["postgresql", "postgres"]
  nuclei_tags: ["postgres", "postgresql", "default-login"]
  target: "hostport"
- name: mssql
  # nmap service 名为 ms-sql 或 microsoft-sql
  service: ["mssql", "ms-sql", "microsoft-sql"]
  product: ["microsoft sql server", "sql server"]
  nuclei_tags: ["mssql", "default-login"]
  target: "hostport"
- name: mongodb
  service: ["mongodb"]
  nuclei_tags: ["mongodb", "default-login"]
  target: "hostport"
- name: memcached
  service: ["memcached"]
  nuclei_tags: ["memcached", "default-login"]
  target: "hostport"
- name: elasticsearch
  # nmap 无 NSE 脚本，仅走 nuclei
  service: ["elasticsearch"]
  product: ["elasticsearch"]
  nuclei_tags: ["elasticsearch", "default-login"]
  target: "hostport"

# ===== 消息队列 =====
- name: rabbitmq
  # nmap NSE 脚本前缀为 amqp-，service 名常为 amqp 或 rabbitmq
  service: ["rabbitmq", "amqp"]
  nuclei_tags: ["rabbitmq", "default-login"]
  target: "hostport"
- name: kafka
  # nmap 无 NSE 脚本，仅走 nuclei
  service: ["kafka"]
  nuclei_tags: ["kafka", "default-login"]
  target: "hostport"
- name: mqtt
  service: ["mqtt"]
  nuclei_tags: ["mqtt", "default-login"]
  target: "hostport"

# ===== 文件 / 共享 =====
- name: smb
  # microsoft-ds / netbios-ssn -> smb (normalize.go 别名)
  service: ["smb"]
  nuclei_tags: ["smb", "default-login"]
  target: "hostport"
- name: nfs
  service: ["nfs"]
  nuclei_tags: ["nfs"]
  target: "hostport"
- name: rpc
  # nmap service 名常为 rpcbind / nlockmgr / mountd 等，统一归入 rpc
  service: ["rpc", "rpcbind", "nlockmgr", "mountd", "msrpc"]
  nuclei_tags: ["rpc"]
  target: "hostport"
- name: rsync
  service: ["rsync"]
  nuclei_tags: ["rsync"]
  target: "hostport"

# ===== 容器 / 编排 =====
- name: docker
  service: ["docker"]
  nuclei_tags: ["docker", "default-login"]
  target: "hostport"
- name: kubernetes
  # nmap 无 NSE 脚本，仅走 nuclei（多为 API/etcd/dashboard HTTP 探测）
  service: ["kubernetes", "k8s"]
  nuclei_tags: ["kubernetes", "default-login"]
  target: "hostport"

# ===== Web 产品指纹（target: url，依赖 httpx 识别技术栈） =====
- name: tomcat
  service: ["http"]
  product: ["tomcat", "apache tomcat"]
  tech: ["tomcat"]
  nuclei_tags: ["tomcat", "apache-tomcat", "default-login"]
  target: "url"
- name: nginx
  service: ["http"]
  product: ["nginx"]
  tech: ["nginx"]
  nuclei_tags: ["nginx", "default-login"]
  target: "url"
- name: apache
  service: ["http"]
  product: ["apache", "apache httpd", "apache http server"]
  tech: ["apache"]
  nuclei_tags: ["apache", "default-login"]
  target: "url"
- name: iis
  service: ["http"]
  product: ["iis", "microsoft iis"]
  tech: ["iis", "microsoft-iis"]
  nuclei_tags: ["iis", "default-login"]
  target: "url"
- name: wordpress
  service: ["http"]
  tech: ["wordpress"]
  nuclei_tags: ["wordpress", "default-login"]
  target: "url"
- name: joomla
  service: ["http"]
  tech: ["joomla"]
  nuclei_tags: ["joomla", "default-login"]
  target: "url"
# 通用 HTTP 兜底：识别为 http 但未命中具体产品时，跑通用 web 模板
- name: http-generic
  service: ["http"]
  nuclei_tags: ["http", "exposure", "misconfig", "default-login"]
  target: "url"
