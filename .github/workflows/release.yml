# 打 tag (v*) 时自动交叉编译多平台归档并发布到 GitHub Release。
# 归档包含可执行文件、DOCX sidecar 与正式模板；外部扫描器仍由用户安装。
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lab:
    uses: ./.github/workflows/lab.yml

  build:
    needs: lab
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release archive
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: make package VERSION="${GITHUB_REF_NAME}" BUILD_FLAGS=-trimpath LDFLAGS="-s -w"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: anchorscan-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/anchorscan-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Detect prerelease
        id: pre
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ -(rc|beta|alpha|pre)[0-9]*$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/anchorscan-*.tar.gz
          prerelease: ${{ steps.pre.outputs.is_prerelease }}
          generate_release_notes: true
